<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse the Tsantiris cafe menu. Coffee, tea, bakery, breakfast, and drinks.">
  <title>Tsantiris Cafe Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="brand-mark" aria-hidden="true">
      <img src="logo.png" alt="">
    </div>
    <div>
      <p class="eyebrow" id="heroEyebrow">Ikarian sweet tastes since 1968</p>
      <h1>Tsantiris Menu</h1>
      <p class="intro" id="heroIntro">Coffee, herbal infusions, bakery favorites, breakfast plates, and simple café drinks.</p>
    </div>
  </header>

  <main>
    <section class="controls" aria-label="Menu controls">
      <div class="controls-top">
        <label class="search-label" for="searchInput" id="searchLabel">Search menu</label>
        <div class="language-toggle" aria-label="Language">
          <button class="language-button active" type="button" data-language="en">EN</button>
          <button class="language-button" type="button" data-language="el">EL</button>
        </div>
      </div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search coffee, tea, pie..." autocomplete="off">
        <button id="clearSearch" class="icon-button" type="button" aria-label="Clear search">×</button>
      </div>
      <div id="categoryFilters" class="category-filters" aria-label="Category filters"></div>
    </section>

    <section id="menuContainer" class="menu-container" aria-live="polite"></section>
  </main>

  <div id="itemModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <button class="modal-backdrop" type="button" aria-label="Close item details"></button>
    <article class="modal-panel">
      <button id="closeModal" class="close-button" type="button" aria-label="Close">×</button>
      <div id="modalImage" class="modal-image" aria-hidden="true"></div>
      <div class="modal-body">
        <p id="modalCategory" class="modal-category"></p>
        <div class="modal-title-row">
          <h2 id="modalTitle"></h2>
          <p id="modalPrice" class="modal-price"></p>
        </div>
        <p id="modalDescription" class="modal-description"></p>
        <dl class="details-list">
          <div>
            <dt id="ingredientsLabel">Ingredients</dt>
            <dd id="modalIngredients"></dd>
          </div>
          <div>
            <dt id="allergensLabel">Allergens</dt>
            <dd id="modalAllergens"></dd>
          </div>
          <div>
            <dt id="sizesLabel">Sizes / options</dt>
            <dd id="modalSizes"></dd>
          </div>
        </dl>
      </div>
    </article>
  </div>

  <script src="script.js"></script>
</body>
</html>
